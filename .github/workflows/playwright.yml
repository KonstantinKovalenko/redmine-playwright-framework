name: Playwright Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # =========================
      # STEP 1: Get previous history
      # =========================
      - name: Download previous Allure history
        continue-on-error: true
        run: |
          mkdir -p old-history
          curl -L -o history.zip https://github.com/${{ github.repository }}/archive/gh-pages.zip || true
          unzip -q history.zip || true
          cp -r */history old-history || true

      # =========================
      # STEP 2: Run tests
      # =========================
      - name: Run Playwright tests
        run: npx playwright test

      # =========================
      # STEP 3: Restore history into results
      # =========================
      - name: Restore Allure history
        run: |
          if [ -d old-history ]; then
            mkdir -p allure-results/history
            cp -r old-history/history/* allure-results/history/ || true
          fi

      # =========================
      # STEP 4: Generate report
      # =========================
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # =========================
      # STEP 5: Deploy to gh-pages
      # =========================
      - name: Deploy Allure report to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report