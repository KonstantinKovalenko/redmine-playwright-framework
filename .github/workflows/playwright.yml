name: Playwright Tests with Allure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 1. Checkout code
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================
      # 2. Setup Node
      # ======================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ======================
      # 3. Install dependencies
      # ======================
      - name: Install dependencies
        run: npm ci

      # ======================
      # 4. Install Playwright browsers
      # ======================
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ======================
      # 5. Download previous Allure results (history)
      # ======================
      - name: Download previous Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: previous-results
        continue-on-error: true

      # ======================
      # 6. Prepare history
      # ======================
      - name: Restore Allure history
        run: |
          mkdir -p allure-results
          if [ -d previous-results/history ]; then
            mkdir -p allure-results/history
            cp -r previous-results/history/* allure-results/history/ || true
          fi

      # ======================
      # 7. Run tests
      # ======================
      - name: Run Playwright tests
        run: npx playwright test

      # ======================
      # 8. Generate Allure report
      # ======================
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # ======================
      # 9. Upload results for next run (history persistence)
      # ======================
      - name: Upload Allure results artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # ======================
      # 10. Deploy report to GitHub Pages
      # ======================
      - name: Deploy Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report